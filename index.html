<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>构成我的9部动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 2px dashed #333;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .card.filled {
            border-style: solid;
            border-color: #2a2a4a;
        }

        .card-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-number {
            font-size: 3rem;
            font-weight: 200;
            color: #333;
            margin-bottom: 10px;
        }

        .card:hover .card-number {
            color: #667eea;
        }

        .card-placeholder {
            font-size: 0.85rem;
            color: #666;
        }

        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }

        .card.filled .card-content {
            display: block;
        }

        .card.filled .card-empty {
            display: none;
        }

        .card-image {
            width: 100%;
            height: 75%;
            object-fit: cover;
            display: block;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            padding: 40px 15px 15px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-year {
            font-size: 0.8rem;
            color: #888;
        }

        .card-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-remove {
            opacity: 1;
        }

        .card-remove:hover {
            background: #e74c3c;
        }

        /* 分享区域 */
        .share-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .share-title {
            font-size: 1rem;
            color: #888;
            margin-bottom: 12px;
        }

        .share-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.95rem;
            resize: none;
            min-height: 120px;
            font-family: inherit;
        }

        .share-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            font-size: 0.8rem;
            color: #666;
            margin-top: 8px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #3a3a6a;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 0.85rem;
        }

        /* 搜索弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
        }

        .modal-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: #fff;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-item-image {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #333;
        }

        .search-item-info {
            flex: 1;
        }

        .search-item-title {
            font-size: 1rem;
            color: #fff;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .search-item-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .card-number {
                font-size: 2rem;
            }

            .card-placeholder {
                font-size: 0.7rem;
            }

            .card-title {
                font-size: 0.8rem;
            }

            .share-section {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>构成我的9部动画</h1>
            <p class="subtitle">点击卡片选择你心目中的动画</p>
        </header>

        <div class="grid" id="animeGrid">
            <!-- 9个卡片 -->
        </div>

        <div class="share-section">
            <div class="share-title">分享文案</div>
            <textarea class="share-input" id="shareText" placeholder="选择动画后，这里会自动生成分享文案..."></textarea>
            <div class="char-count"><span id="charCount">0</span> 字</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="copyShareText()">复制分享文案</button>
            <button class="btn btn-secondary" onclick="resetAll()">全部重置</button>
        </div>

        <footer>
            <p>使用 AniList API 搜索动画数据</p>
        </footer>
    </div>

    <!-- 搜索弹窗 -->
    <div class="modal-overlay" id="searchModal">
        <div class="modal" style="position: relative;">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <div class="modal-title">搜索动画 #<span id="modalSlotNum">1</span></div>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="输入动画名称搜索..." oninput="debounceSearch()">
                </div>
            </div>
            <div class="modal-body">
                <div class="search-results" id="searchResults">
                    <div class="empty-state">输入动画名称开始搜索</div>
                </div>
            </div>
        </div>
    </div>

        let currentSlot = -1;

        const chineseAnimeMap = {

            '辉夜': 'Kaguya-sama',
            
            // 五等分的花嫁
            '五等分的花嫁': 'Go-toubun no Hanayome',
            '五等分': 'Go-toubun no Hanayome',
            
            // 青春猪头少年
            '青春猪头少年': 'Seishun Buta Yarou',
            '麻衣学姐': 'Seishun Buta Yarou',
            
            // 紫罗兰永恒花园
            '紫罗兰永恒花园': 'Violet Evergarden',
            
            // 声之形
            '声之形': 'Koe no Katachi',
            
            // 言叶之庭
            '言叶之庭': 'Kotonoha no Niwa',
            
            // 秒速五厘米
            '秒速五厘米': '5 Centimeters per Second',
            
            // 萤火之森
            '萤火之森': 'Hotarubi no Mori e',
            
            // 未闻花名
            '未闻花名': 'Anohana',
            '我们仍未知道那天所看见的花的名字': 'Anohana',
            
            // CLANNAD
            'CLANNAD': 'Clannad',
            
            // AIR
            'AIR': 'Air',
            
            //  Kanon
            'Kanon': 'Kanon',
            
            // 凉宫春日
            '凉宫春日': 'Haruhi Suzumiya',
            
            // 幸运星
            '幸运星': 'Lucky Star',
            
            // 轻音少女
            '轻音少女': 'K-On',
            '轻音': 'K-On',
            
            // 魔法少女小圆
            '魔法少女小圆': 'Madoka Magica',
            
            // 命运石之门
            '命运石之门': 'Steins Gate',
            
            //  Re:从零开始
            '从零开始': 'Re:Zero',
            'Re0': 'Re:Zero',
            
            //  overlord
            '骨王': 'Overlord',
            
            // 关于我转生变成史莱姆这档事
            '史莱姆': 'Tensei shitara Slime',

            '无职转生': 'Mushoku Tensei',

            '游戏人生': 'No Game No Life',
            'NGNL': 'No Game No Life',

            '刀剑神域': 'Sword Art Online',
            'SAO': 'Sword Art Online',
            
            // 加速世界
            '加速世界': 'Accel World',
            
            // 东京喰种
            '东京喰种': 'Tokyo Ghoul',
            '东京食尸鬼': 'Tokyo Ghoul',
            
            // 寄生兽
            '寄生兽': 'Parasyte',
            
            // another
            '替身': 'Another',
            'Another': 'Another',
            
            // 寒蝉
            '寒蝉鸣泣之时': 'Higurashi',
            
            // 未来日记
            '未来日记': 'Mirai Nikki',
            
            // 死亡笔记
            '死亡笔记': 'Death Note',
            'DN': 'Death Note',
            
            // 心理测量者
            '心理测量者': 'Psycho Pass',
            
            // 攻壳机动队
            '攻壳机动队': 'Ghost in the Shell',
            
            // 星际牛仔
            '星际牛仔': 'Cowboy Bebop',
            
            // 混沌武士
            '混沌武士': 'Samurai Champloo'
        };

        // Bangumi API 代理（使用 corsproxy 或类似服务）
        // 由于 Bangumi API 有 CORS 限制，我们使用多个备用方案
        
        // 初始化网格
        function initGrid() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const card = document.createElement('div');
                card.className = 'card' + (selectedAnimes[i] ? ' filled' : '');
                card.onclick = () => openSearch(i);
                
                card.innerHTML = `
                    <div class="card-empty">
                        <div class="card-number">${i + 1}</div>
                        <div class="card-placeholder">点击选择</div>
                    </div>
                    <div class="card-content">
                        <img class="card-image" src="${selectedAnimes[i]?.cover || ''}" alt="">
                        <button class="card-remove" onclick="event.stopPropagation(); removeAnime(${i})">&times;</button>
                        <div class="card-info">
                            <div class="card-title">${selectedAnimes[i]?.title || ''}</div>
                            <div class="card-year">${selectedAnimes[i]?.year || ''}</div>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            }
            
            updateShareText();
        }

        // 打开搜索弹窗
        function openSearch(slot) {
            currentSlot = slot;
            document.getElementById('modalSlotNum').textContent = slot + 1;
            document.getElementById('searchModal').classList.add('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').focus();
            document.getElementById('searchResults').innerHTML = '<div class="empty-state">输入动画名称开始搜索（支持中文、日文、英文）</div>';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('searchModal').classList.remove('active');
            currentSlot = -1;
        }

        // 防抖搜索
        function debounceSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">输入动画名称开始搜索（支持中文、日文、英文）</div>';
                return;
            }
            
            document.getElementById('searchResults').innerHTML = '<div class="loading">搜索中...</div>';
            
            searchTimeout = setTimeout(() => searchAnime(query), 400);
        }

        // 获取搜索关键词（支持中文映射）
        function getSearchKeywords(query) {
            const keywords = [query];
            
            // 检查是否有中文映射
            for (const [cnName, enName] of Object.entries(chineseAnimeMap)) {
                if (query.toLowerCase().includes(cnName.toLowerCase()) || 
                    cnName.toLowerCase().includes(query.toLowerCase())) {
                    if (!keywords.includes(enName)) {
                        keywords.push(enName);
                    }
                }
            }
            
            return keywords;
        }

        // 搜索动画 - 使用 MyAnimeList + Jikan API (支持中文搜索)
        async function searchAnime(query) {
            const searchResults = document.getElementById('searchResults');
            
            try {
                let allResults = [];
                const keywords = getSearchKeywords(query);
                
                // 1. 首先用原关键词尝试 Jikan API
                for (const keyword of keywords) {
                    try {
                        const jikanRes = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(keyword)}&limit=10`);
                        const jikanData = await jikanRes.json();
                        if (jikanData.data && jikanData.data.length > 0) {
                            const mapped = jikanData.data.map(item => ({
                                id: item.mal_id,
                                title: item.title,
                                titleJP: item.title_japanese,
                                cover: item.images?.jpg?.large_image_url || item.images?.jpg?.image_url,
                                year: item.year || (item.aired?.from ? new Date(item.aired.from).getFullYear() : '未知'),
                                type: item.type || 'TV'
                            }));
                            allResults = [...allResults, ...mapped];
                        }
                    } catch (e) {
                        console.log('Jikan search failed for:', keyword, e);
                    }
                    
                    // Jikan API 有速率限制，短暂延迟
                    await new Promise(r => setTimeout(r, 400));
                }
                
                // 2. 去重（根据 ID）
                const seen = new Set();
                allResults = allResults.filter(item => {
                    if (seen.has(item.id)) return false;
                    seen.add(item.id);
                    return true;
                });
                
                // 3. 如果 Jikan 结果不足，尝试 AniList
                if (allResults.length < 5) {
                    for (const keyword of keywords) {
                        try {
                            const anilistRes = await fetch('https://graphql.anilist.co', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    query: `
                                        query ($search: String) {
                                            Page(page: 1, perPage: 10) {
                                                media(search: $search, type: ANIME, sort: POPULARITY_DESC) {
                                                    id
                                                    title { native romaji english }
                                                    coverImage { medium large }
                                                    seasonYear
                                                    format
                                                }
                                            }
                                        }
                                    `,
                                    variables: { search: keyword }
                                })
                            });
                            const anilistData = await anilistRes.json();
                            const animes = anilistData.data?.Page?.media || [];
                            const mapped = animes.map(anime => ({
                                id: `al_${anime.id}`,
                                title: anime.title.native || anime.title.romaji || anime.title.english,
                                titleJP: anime.title.native,
                                cover: anime.coverImage.large || anime.coverImage.medium,
                                year: anime.seasonYear || '未知',
                                type: anime.format || 'TV'
                            }));
                            allResults = [...allResults, ...mapped];
                        } catch (e) {
                            console.log('AniList search failed:', e);
                        }
                    }
                    
                    // 再次去重
                    const seen2 = new Set();
                    allResults = allResults.filter(item => {
                        if (seen2.has(item.title)) return false;
                        seen2.add(item.title);
                        return true;
                    });
                }
                
                if (allResults.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">未找到相关动画<br><small>尝试用其他关键词，如 "Naruto"、"One Piece" 等</small></div>';
                    return;
                }
                
                // 取前 10 个结果
                allResults = allResults.slice(0, 10);
                
                searchResults.innerHTML = allResults.map(anime => `
                    <div class="search-item" onclick='selectAnime(${JSON.stringify({
                        id: anime.id,
                        title: anime.title,
                        cover: anime.cover,
                        year: anime.year,
                        type: anime.type
                    }).replace(/'/g, "&#39;")})'>
                        <img class="search-item-image" src="${anime.cover}" alt="" onerror="this.src='https://via.placeholder.com/60x80/333/666?text=No+Image'">
                        <div class="search-item-info">
                            <div class="search-item-title">${anime.title}</div>
                            <div class="search-item-meta">${anime.year} · ${anime.type}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                searchResults.innerHTML = '<div class="empty-state">搜索失败，请稍后重试</div>';
                console.error('Search error:', error);
            }
        }

        // 选择动画
        function selectAnime(anime) {
            selectedAnimes[currentSlot] = anime;
            localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
            initGrid();
            closeModal();
        }

        // 移除动画
        function removeAnime(slot) {
            selectedAnimes[slot] = null;
            localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
            initGrid();
        }

        // 更新分享文案
        function updateShareText() {
            const shareText = document.getElementById('shareText');
            const charCount = document.getElementById('charCount');
            
            const hasSelections = selectedAnimes.some(a => a !== null);
            
            if (!hasSelections) {
                shareText.value = '';
                charCount.textContent = '0';
                return;
            }
            
            let text = '#构成我的9部动画\n\n';
            selectedAnimes.forEach((anime, i) => {
                text += `${i + 1}. ${anime ? anime.title : '（未选择）'}\n`;
            });
            text += '\n' + window.location.href;
            
            shareText.value = text;
            charCount.textContent = text.length;
        }

        // 复制分享文案
        function copyShareText() {
            const shareText = document.getElementById('shareText');
            if (!shareText.value) {
                alert('请先选择一些动画');
                return;
            }
            
            shareText.select();
            document.execCommand('copy');
            
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = originalText, 2000);
        }

        // 全部重置
        function resetAll() {
            if (confirm('确定要清空所有选择吗？')) {
                selectedAnimes = Array(9).fill(null);
                localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
                initGrid();
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('searchModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // 初始化
        initGrid();
    </script>
</body>
</html>

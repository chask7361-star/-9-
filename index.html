<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>构成我的9部动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #888;
            font-size: 0.8rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 16px;
            flex: 1;
            max-height: calc(100vh - 280px);
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            overflow: hidden;
            border: 1.5px dashed #333;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 3/4;
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: 160px;
            max-height: 210px;
            margin: 0 auto;
            width: 100%;
        }

        .card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .card.filled {
            border-style: solid;
            border-color: #2a2a4a;
        }

        .card-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-number {
            font-size: 1.6rem;
            font-weight: 200;
            color: #333;
            margin-bottom: 4px;
        }

        .card:hover .card-number {
            color: #667eea;
        }

        .card-placeholder {
            font-size: 0.7rem;
            color: #666;
        }

        .card-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }

        .card.filled .card-content {
            display: block;
        }

        .card.filled .card-empty {
            display: none;
        }

        .card-image {
            width: 100%;
            height: 70%;
            object-fit: cover;
            display: block;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
            padding: 20px 8px 8px;
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card-year {
            font-size: 0.65rem;
            color: #888;
        }

        .card-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-remove {
            opacity: 1;
        }

        .card-remove:hover {
            background: #e74c3c;
        }

        /* 分享区域 */
        .share-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .share-title {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }

        .share-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.85rem;
            resize: none;
            min-height: 70px;
            font-family: inherit;
        }

        .share-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: #666;
            margin-top: 6px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex-shrink: 0;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #2a2a4a;
            color: #e0e0e0;
        }

        .btn-secondary:hover {
            background: #3a3a6a;
        }

        footer {
            text-align: center;
            margin-top: 12px;
            color: #555;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* 搜索弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a4a;
        }

        .modal-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: #fff;
            font-size: 1rem;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-item:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .search-item-image {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #333;
        }

        .search-item-info {
            flex: 1;
        }

        .search-item-title {
            font-size: 1rem;
            color: #fff;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .search-item-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .card-number {
                font-size: 2rem;
            }

            .card-placeholder {
                font-size: 0.7rem;
            }

            .card-title {
                font-size: 0.8rem;
            }

            .share-section {
                padding: 16px;
            }
        }
    </style>
</head>

        // Bangumi API 代理（使用 corsproxy 或类似服务）
        // 由于 Bangumi API 有 CORS 限制，我们使用多个备用方案
        
        // 初始化网格
        function initGrid() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const card = document.createElement('div');
                card.className = 'card' + (selectedAnimes[i] ? ' filled' : '');
                card.onclick = () => openSearch(i);
                
                card.innerHTML = `
                    <div class="card-empty">
                        <div class="card-number">${i + 1}</div>
                        <div class="card-placeholder">点击选择</div>
                    </div>
                    <div class="card-content">
                        <img class="card-image" src="${selectedAnimes[i]?.cover || ''}" alt="">
                        <button class="card-remove" onclick="event.stopPropagation(); removeAnime(${i})">&times;</button>
                        <div class="card-info">
                            <div class="card-title">${selectedAnimes[i]?.title || ''}</div>
                            <div class="card-year">${selectedAnimes[i]?.year || ''}</div>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            }
            
            updateShareText();
        }

        // 打开搜索弹窗
        function openSearch(slot) {
            currentSlot = slot;
            document.getElementById('modalSlotNum').textContent = slot + 1;
            document.getElementById('searchModal').classList.add('active');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').focus();
            document.getElementById('searchResults').innerHTML = '<div class="empty-state">输入动画名称开始搜索<br><small>支持中文直搜，已接入Bangumi中文数据库</small></div>';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('searchModal').classList.remove('active');
            currentSlot = -1;
        }

        // 防抖搜索
        function debounceSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) {
                document.getElementById('searchResults').innerHTML = '<div class="empty-state">输入动画名称开始搜索<br><small>支持中文直搜，已接入Bangumi中文数据库</small></div>';
                return;
            }
            
            document.getElementById('searchResults').innerHTML = '<div class="loading">搜索中...</div>';
            
            searchTimeout = setTimeout(() => searchAnime(query), 400);
        }

        // 检查是否匹配中文映射表
        function checkChineseMapping(query) {
            const lowerQuery = query.toLowerCase().trim();
            
            // 精确匹配
            if (chineseAnimeMap[query]) {
                return chineseAnimeMap[query];
            }
            
            // 模糊匹配
            for (const [cnName, data] of Object.entries(chineseAnimeMap)) {
                if (lowerQuery.includes(cnName.toLowerCase()) || 
                    cnName.toLowerCase().includes(lowerQuery)) {
                    return data;
                }
            }
            
            return null;
        }

        // 检测是否为中文
        function isChinese(text) {
            return /[\u4e00-\u9fa5]/.test(text);
        }

        // 使用 MyMemory 免费翻译API
        async function translateToEnglish(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=zh-CN|en`);
                const data = await res.json();
                if (data.responseData && data.responseData.translatedText) {
                    return data.responseData.translatedText;
                }
            } catch (e) {
                console.log('Translation failed:', e);
            }
            return null;
        }

        // Bangumi API 搜索（中文数据库）
        async function searchBangumi(query) {
            try {
                // 使用 chii.in 的 CORS 代理或直接请求
                const res = await fetch(`https://api.bgm.tv/search/subject/${encodeURIComponent(query)}?type=2&responseGroup=small&max_results=10`, {
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': '9-Animes-App/1.0'
                    }
                });
                const data = await res.json();
                
                if (data.list && data.list.length > 0) {
                    return data.list.map(item => ({
                        id: `bgm_${item.id}`,
                        title: item.name_cn || item.name,
                        titleJP: item.name,
                        cover: item.images?.large || item.images?.common || item.images?.grid,
                        year: item.air_date ? item.air_date.substring(0, 4) : (item.date ? item.date.substring(0, 4) : '未知'),
                        type: item.type === 2 ? 'TV' : 'Movie',
                        source: 'bangumi'
                    }));
                }
            } catch (e) {
                console.log('Bangumi search failed:', e);
            }
            return [];
        }

        // 搜索动画 - 优先使用本地映射表，其次用API搜索
        async function searchAnime(query) {
            const searchResults = document.getElementById('searchResults');
            
            try {
                let allResults = [];
                const isCn = isChinese(query);
                let translatedQuery = null;
                
                // 1. 优先检查中文映射表（最精准）
                const mappedData = checkChineseMapping(query);
                if (mappedData) {
                    try {
                        const jikanRes = await fetch(`https://api.jikan.moe/v4/anime/${mappedData.id}`);
                        const jikanData = await jikanRes.json();
                        
                        if (jikanData.data) {
                            const item = jikanData.data;
                            allResults.push({
                                id: `mal_${item.mal_id}`,
                                title: item.title,
                                cover: item.images?.jpg?.large_image_url || item.images?.jpg?.image_url,
                                year: item.year || (item.aired?.from ? new Date(item.aired.from).getFullYear() : mappedData.year),
                                type: item.type || 'TV',
                                exactMatch: true
                            });
                        }
                    } catch (e) {
                        allResults.push({
                            id: `mal_${mappedData.id}`,
                            title: mappedData.title,
                            cover: `https://cdn.myanimelist.net/images/anime/${mappedData.id}.jpg`,
                            year: mappedData.year,
                            type: 'TV',
                            exactMatch: true
                        });
                    }
                }
                
                // 2. 如果是中文且本地映射没找到，先搜索Bangumi中文数据库
                let bangumiResults = [];
                if (isCn && !mappedData) {
                    searchResults.innerHTML = '<div class="loading">正在搜索中文数据库(Bangumi)...</div>';
                    bangumiResults = await searchBangumi(query);
                    if (bangumiResults.length > 0) {
                        allResults = [...allResults, ...bangumiResults];
                    }
                }
                
                // 3. 同时用 Jikan API 搜索（原关键词）
                try {
                    const jikanRes = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=10`);
                    const jikanData = await jikanRes.json();
                    if (jikanData.data && jikanData.data.length > 0) {
                        const mapped = jikanData.data.map(item => ({
                            id: `mal_${item.mal_id}`,
                            title: item.title,
                            cover: item.images?.jpg?.large_image_url || item.images?.jpg?.image_url,
                            year: item.year || (item.aired?.from ? new Date(item.aired.from).getFullYear() : '未知'),
                            type: item.type || 'TV'
                        }));
                        allResults = [...allResults, ...mapped];
                    }
                } catch (e) {
                    console.log('Jikan search failed:', e);
                }
                
                // 4. 如果Bangumi和本地映射都没结果，尝试翻译
                if (isCn && !mappedData && bangumiResults.length === 0) {
                    searchResults.innerHTML = '<div class="loading">中文数据库未找到，正在翻译搜索...</div>';
                    translatedQuery = await translateToEnglish(query);
                    console.log('Translated:', query, '->', translatedQuery);
                    
                    if (translatedQuery && translatedQuery !== query) {
                        try {
                            const jikanRes = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(translatedQuery)}&limit=10`);
                            const jikanData = await jikanRes.json();
                            if (jikanData.data && jikanData.data.length > 0) {
                                const mapped = jikanData.data.map(item => ({
                                    id: `mal_${item.mal_id}`,
                                    title: item.title,
                                    cover: item.images?.jpg?.large_image_url || item.images?.jpg?.image_url,
                                    year: item.year || (item.aired?.from ? new Date(item.aired.from).getFullYear() : '未知'),
                                    type: item.type || 'TV',
                                    translatedFrom: translatedQuery
                                }));
                                allResults = [...allResults, ...mapped];
                            }
                        } catch (e) {
                            console.log('Translated search failed:', e);
                        }
                    }
                }
                
                // 3. 去重（根据 ID）
                const seen = new Set();
                allResults = allResults.filter(item => {
                    if (seen.has(item.id)) return false;
                    seen.add(item.id);
                    return true;
                });
                
                // 4. 排序：精准匹配放最前面
                allResults.sort((a, b) => {
                    if (a.exactMatch && !b.exactMatch) return -1;
                    if (!a.exactMatch && b.exactMatch) return 1;
                    return 0;
                });
                
                if (allResults.length === 0) {
                    searchResults.innerHTML = '<div class="empty-state">未找到相关动画<br><small>尝试用日文/英文原名搜索，或检查网络连接</small></div>';
                    return;
                }
                
                // 取前 10 个结果
                allResults = allResults.slice(0, 10);
                
                searchResults.innerHTML = allResults.map((anime, index) => `
                    <div class="search-item" onclick='selectAnime(${JSON.stringify({
                        id: anime.id,
                        title: anime.title,
                        cover: anime.cover,
                        year: anime.year,
                        type: anime.type
                    }).replace(/'/g, "&#39;")})' style="${anime.exactMatch ? 'border: 2px solid #667eea;' : anime.source === 'bangumi' ? 'border: 2px solid #ff6b6b;' : anime.translatedFrom ? 'border: 2px solid #42b983;' : ''}">
                        <img class="search-item-image" src="${anime.cover}" alt="" onerror="this.src='https://via.placeholder.com/60x80/333/666?text=No+Image'">
                        <div class="search-item-info">
                            <div class="search-item-title">${anime.title} ${anime.exactMatch ? '<span style="color: #667eea; font-size: 0.75em;">[本地]</span>' : anime.source === 'bangumi' ? '<span style="color: #ff6b6b; font-size: 0.75em;">[Bangumi]</span>' : anime.translatedFrom ? '<span style="color: #42b983; font-size: 0.75em;">[译]</span>' : ''}</div>
                            <div class="search-item-meta">${anime.year} · ${anime.type}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                searchResults.innerHTML = '<div class="empty-state">搜索失败，请稍后重试</div>';
                console.error('Search error:', error);
            }
        }

        // 选择动画
        function selectAnime(anime) {
            selectedAnimes[currentSlot] = anime;
            localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
            initGrid();
            closeModal();
        }

        // 移除动画
        function removeAnime(slot) {
            selectedAnimes[slot] = null;
            localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
            initGrid();
        }

        // 更新分享文案
        function updateShareText() {
            const shareText = document.getElementById('shareText');
            const charCount = document.getElementById('charCount');
            
            const hasSelections = selectedAnimes.some(a => a !== null);
            
            if (!hasSelections) {
                shareText.value = '';
                charCount.textContent = '0';
                return;
            }
            
            let text = '#构成我的9部动画\n\n';
            selectedAnimes.forEach((anime, i) => {
                text += `${i + 1}. ${anime ? anime.title : '（未选择）'}\n`;
            });
            text += '\n' + window.location.href;
            
            shareText.value = text;
            charCount.textContent = text.length;
        }

        // 复制分享文案
        function copyShareText() {
            const shareText = document.getElementById('shareText');
            if (!shareText.value) {
                alert('请先选择一些动画');
                return;
            }
            
            shareText.select();
            document.execCommand('copy');
            
            const btn = document.querySelector('.btn-primary');
            const originalText = btn.textContent;
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = originalText, 2000);
        }

        // 全部重置
        function resetAll() {
            if (confirm('确定要清空所有选择吗？')) {
                selectedAnimes = Array(9).fill(null);
                localStorage.setItem('my9animes', JSON.stringify(selectedAnimes));
                initGrid();
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('searchModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        // 初始化
        initGrid();
    </script>
